# Kobo runtime defaults shared in-repo.
#
# Keep API keys and other secrets in .env or real environment variables.
# Any values here can be overridden by:
#   1) process environment variables
#   2) .env entries

# Core app
host: 0.0.0.0
port: 8000

# Data paths
agent_checkpoint_db_path: .kobo/langgraph_checkpoints.sqlite
mem0_qdrant_path: .kobo/qdrant
mem0_qdrant_on_disk: true
link_alias_db_path: .kobo/link_aliases.db
agent_behavior_log_path: .kobo/logs/agent_behavior.jsonl

# Agent/runtime limits
agent_recursion_limit: 250
agent_max_completion_tokens: 4096
agent_max_user_reply_chars: 4000
agent_context_token_limit: 20000
agent_context_recent_tokens: 3500
agent_context_rollup_tokens: 2200
agent_context_compaction_source_tokens: 12000

# LLM/provider configuration
llm_model: z-ai/glm-5.2
memory_llm_model: google/gemini-3-flash-preview
llm_reasoning_effort: medium
wake_classifier_model: null
wake_execution_model: z-ai/glm-5.2
workflow_setup_input_classifier_model: z-ai/glm-5.2
multimodal_llm: google/gemini-3.1-flash-lite-preview
business_knowledge_oracle_model: google/gemini-3.1-flash-lite-preview
openai_compatible_embedding_model: openai/text-embedding-3-small
agent_prompt_caching_enabled: true
agent_prompt_cache_ttl_1h: false

# Behavioral/runtime toggles
proactive_heartbeat_default_hours: 3
agent_behavior_log_enabled: true
browser_use_headless: true
browser_use_model: google/gemini-3-flash-preview
browser_use_max_concurrent_tasks: 2
browser_use_task_retention_seconds: 1800
browser_use_cloud_proxy_country_code: us
browser_use_cloud_timeout_minutes: 15

# Integrations (non-secret)
kobo_app_url: http://127.0.0.1:8000

# Memory service
mem0_user_id: default
